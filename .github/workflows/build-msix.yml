name: Build MSIX (Microsoft Store)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # GitHub Releases 업로드 권한

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write Firebase config
        run: echo "$env:FIREBASE_JS" | Out-File -FilePath src/firebase.js -Encoding utf8
        env:
          FIREBASE_JS: ${{ secrets.FIREBASE_JS }}

      - name: Build MSIX
        run: npm run build:msix

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: StretchWidget-msix
          path: release/*.appx
          retention-days: 30

      # 태그 push 시 GitHub Release 생성 후 .appx 첨부
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release create ${{ github.ref_name }} --generate-notes --title "StretchWidget ${{ github.ref_name }}" || true
          gh release upload ${{ github.ref_name }} release/*.appx --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
