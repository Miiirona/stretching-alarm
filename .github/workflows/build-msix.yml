name: Build MSIX (Microsoft Store)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Firebase 설정 파일은 gitignore 처리되어 있으므로
      # GitHub → Settings → Secrets → FIREBASE_JS 에 src/firebase.js 전체 내용을 붙여넣기
      - name: Write Firebase config
        run: echo "$env:FIREBASE_JS" | Out-File -FilePath src/firebase.js -Encoding utf8
        env:
          FIREBASE_JS: ${{ secrets.FIREBASE_JS }}

      - name: Build MSIX
        run: npm run build:msix

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: StretchWidget-msix
          path: release/*.appx
          retention-days: 30

      # 태그 push 시에만 Store 자동 제출 (수동 실행은 빌드만)
      - name: Submit to Microsoft Store
        if: startsWith(github.ref, 'refs/tags/')
        uses: microsoft/store-publish@v1
        with:
          product-id: ${{ secrets.STORE_PRODUCT_ID }}
          package-path: release/*.appx
        env:
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          AZURE_AD_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          AZURE_AD_CLIENT_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
