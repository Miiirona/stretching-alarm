name: Build NSIS Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # GitHub Releases 생성 권한

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write Firebase config
        run: echo "$env:FIREBASE_JS" | Out-File -FilePath src/firebase.js -Encoding utf8
        env:
          FIREBASE_JS: ${{ secrets.FIREBASE_JS }}

      # 태그 push → GitHub Releases에 배포 (자동 업데이트 서버 역할)
      - name: Build and publish release
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run build:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 수동 실행 → 아티팩트만 업로드 (테스트용)
      - name: Build only
        if: github.event_name == 'workflow_dispatch'
        run: npm run build:nsis

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StretchWidget-installer
          path: release/*.exe
          retention-days: 30
