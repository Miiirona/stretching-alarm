name: Build DMG (macOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write Firebase config
        run: echo "$FIREBASE_JS" > src/firebase.js
        env:
          FIREBASE_JS: ${{ secrets.FIREBASE_JS }}

      - name: Build DMG
        run: npm run build:dmg
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false  # 코드 서명 스킵 (미서명 배포)

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: StretchWidget-dmg
          path: release/*.dmg
          retention-days: 30
