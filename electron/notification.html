<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 360px;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .toast {
      width: 340px;
      margin: 8px auto 0;
      background: rgba(22, 22, 28, 0.96);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 16px 48px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.3);
      padding: 18px 18px 16px;
      color: #fff;
      -webkit-app-region: drag;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 13px;
    }
    .icon-wrap {
      width: 40px; height: 40px;
      background: rgba(0, 184, 148, 0.15);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .label-title { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
    .label-sub   { font-size: 11.5px; color: rgba(255,255,255,0.45); margin-top: 2px; }
    .dev-badge {
      display: inline-block;
      background: #E74C3C;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 2px 5px;
      border-radius: 4px;
      vertical-align: middle;
      margin-left: 5px;
    }

    /* ── Guide zone ── */
    .guide-zone {
      display: flex;
      align-items: flex-start;
      gap: 13px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 13px;
      padding: 12px 13px 9px;
      margin-bottom: 12px;
      min-height: 76px;
    }
    .anim-area {
      width: 52px; height: 52px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
    }
    .guide-text-wrap { flex: 1; min-width: 0; }
    .guide-type {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: #00B894;
      margin-bottom: 4px;
    }
    .guide-inst-title {
      font-size: 12.5px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.2px;
      margin-bottom: 3px;
    }
    .guide-inst-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      line-height: 1.4;
    }

    /* ── Paired guide items ── */
    .guide-pair-item {
      display: flex;
      align-items: flex-start;
      gap: 5px;
      margin-top: 4px;
    }
    .guide-pair-num {
      font-size: 10px;
      font-weight: 700;
      color: #00B894;
      flex-shrink: 0;
      margin-top: 1px;
      line-height: 1.4;
    }
    .guide-pair-body { flex: 1; }
    .guide-pair-title {
      font-size: 11.5px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.2px;
      line-height: 1.3;
    }
    .guide-pair-desc {
      font-size: 11.5px;
      color: rgba(255,255,255,0.55);
      line-height: 1.4;
      margin-top: 1px;
    }
    .guide-pair-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin-top: 8px;
      margin-bottom: 12px;
    }

    /* ── 목/어깨: breathing circles ── */
    .breathe-outer {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 2px solid rgba(0,184,148,0.3);
      display: flex; align-items: center; justify-content: center;
      animation: breatheOuter 4s ease-in-out infinite;
    }
    .breathe-inner {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(0,184,148,0.18);
      border: 2px solid #00B894;
      animation: breatheInner 4s ease-in-out infinite;
    }
    @keyframes breatheOuter {
      0%, 100% { transform: scale(0.82); opacity: 0.35; }
      50% { transform: scale(1.12); opacity: 0.85; }
    }
    @keyframes breatheInner {
      0%, 100% { transform: scale(0.88); }
      50% { transform: scale(1.12); }
    }

    /* ── 손목: rotating arrow ring ── */
    .wrist-svg {
      width: 48px; height: 48px;
      animation: wristSpin 2.4s linear infinite;
    }
    @keyframes wristSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── 허리/등: wave equalizer bars ── */
    .back-bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 40px;
    }
    .back-bar {
      width: 7px;
      border-radius: 4px;
      background: #00B894;
    }
    .back-bar:nth-child(1) { animation: waveBar 1.3s ease-in-out infinite 0s; }
    .back-bar:nth-child(2) { animation: waveBar 1.3s ease-in-out infinite 0.18s; }
    .back-bar:nth-child(3) { animation: waveBar 1.3s ease-in-out infinite 0.36s; }
    .back-bar:nth-child(4) { animation: waveBar 1.3s ease-in-out infinite 0.54s; }
    .back-bar:nth-child(5) { animation: waveBar 1.3s ease-in-out infinite 0.72s; }
    @keyframes waveBar {
      0%, 100% { height: 10px; opacity: 0.4; }
      50% { height: 36px; opacity: 1; }
    }

    /* ── 스쿼트: bouncing figure ── */
    .squat-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      animation: squatMove 1.4s ease-in-out infinite;
    }
    .squat-head {
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #00B894;
      flex-shrink: 0;
    }
    .squat-body {
      width: 9px;
      background: rgba(0,184,148,0.7);
      border-radius: 3px;
      transform-origin: top center;
      animation: squatBody 1.4s ease-in-out infinite;
    }
    .squat-legs {
      display: flex;
      gap: 5px;
      animation: squatLegs 1.4s ease-in-out infinite;
    }
    .squat-leg {
      width: 6px; height: 14px;
      background: rgba(0,184,148,0.55);
      border-radius: 3px;
      transform-origin: top center;
    }
    @keyframes squatMove {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(10px); }
    }
    @keyframes squatBody {
      0%, 100% { height: 16px; }
      50% { height: 10px; }
    }
    @keyframes squatLegs {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.6); }
    }

    /* ── 걷기: alternating feet ── */
    .walk-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .walk-body {
      width: 10px; height: 18px;
      background: rgba(0,184,148,0.65);
      border-radius: 4px;
      position: relative;
    }
    .walk-body::before {
      content: '';
      position: absolute;
      top: -16px; left: 50%; transform: translateX(-50%);
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #00B894;
    }
    .walk-feet { display: flex; gap: 10px; }
    .walk-foot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #00B894;
      opacity: 0.8;
    }
    .walk-foot:nth-child(1) { animation: walkStep 0.9s ease-in-out infinite 0s; }
    .walk-foot:nth-child(2) { animation: walkStep 0.9s ease-in-out infinite 0.45s; }
    @keyframes walkStep {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50% { transform: translateY(-14px); opacity: 1; }
    }

    /* ── 눈: blinking + moving eye ── */
    .eye-socket {
      width: 40px; height: 22px;
      border: 2.5px solid #00B894;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      animation: eyeBlink 4s ease-in-out infinite;
    }
    .eye-pupil {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #00B894;
      animation: eyeMove 4s ease-in-out infinite;
    }
    @keyframes eyeBlink {
      0%, 75%, 100% { transform: scaleY(1); }
      82%            { transform: scaleY(0.05); }
      87%            { transform: scaleY(1); }
    }
    @keyframes eyeMove {
      0%, 100%  { transform: translateX(0); }
      25%       { transform: translateX(8px); }
      60%       { transform: translateX(-8px); }
    }

    /* ── 목: head tilt ── */
    .neck-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .neck-head {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2.5px solid #00B894;
      background: rgba(0,184,148,0.18);
      animation: neckTilt 2.6s ease-in-out infinite;
    }
    .neck-stub {
      width: 5px; height: 12px;
      background: rgba(0,184,148,0.45);
      border-radius: 3px;
      animation: neckTilt 2.6s ease-in-out infinite;
      transform-origin: top center;
    }
    @keyframes neckTilt {
      0%, 100% { transform: rotate(0deg); }
      25%      { transform: rotate(-20deg); }
      75%      { transform: rotate(20deg); }
    }

    /* ── 종아리: heel raise ── */
    .calf-figure {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      animation: calfRaise 1.5s ease-in-out infinite;
    }
    .calf-body {
      width: 10px; height: 18px;
      background: rgba(0,184,148,0.55);
      border-radius: 3px;
      position: relative;
    }
    .calf-body::before {
      content: '';
      position: absolute;
      top: -15px; left: 50%; transform: translateX(-50%);
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #00B894;
    }
    .calf-heels {
      display: flex; gap: 8px;
    }
    .calf-heel {
      width: 10px; height: 5px;
      border-radius: 3px;
      background: rgba(0,184,148,0.7);
    }
    @keyframes calfRaise {
      0%, 100%  { transform: translateY(0); }
      40%, 60%  { transform: translateY(-12px); }
    }

    /* ── Daily gauge ── */
    .gauge { margin-bottom: 11px; }
    .gauge-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
    }
    .gauge-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.28);
    }
    .gauge-count {
      font-size: 10.5px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
    }
    .gauge-dots { display: flex; gap: 5px; }
    .gauge-dot {
      flex: 1;
      height: 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.1);
    }
    .gauge-dot.filled { background: #00B894; }
    .gauge-dot.extra  { background: #fdcb6e; }

    /* ── Buttons ── */
    .actions {
      display: flex;
      flex-direction: column;
      -webkit-app-region: no-drag;
    }
    .btn + .btn { margin-top: 7px; }
    .btn {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: -0.2px;
    }
    .btn:hover  { opacity: 0.82; }
    .btn:active { transform: scale(0.98); opacity: 0.7; }
    .btn-primary   { background: #00B894; color: #fff; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-ghost {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.55);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .caret {
      font-size: 9px;
      display: inline-block;
      transition: transform 0.2s;
      opacity: 0.6;
    }
    .caret.open { transform: rotate(180deg); }

    /* ── DND panel ── */
    .dnd-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }
    .dnd-panel.open {
      max-height: 160px;
      margin-top: 7px;
    }
    .dnd-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      padding-top: 7px;
    }
    .dnd-opt {
      padding: 8px 6px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.72);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: background 0.15s;
      letter-spacing: -0.2px;
    }
    .dnd-opt:hover { background: rgba(255,255,255,0.15); }
    .dnd-opt.full  { grid-column: 1 / -1; }
  </style>
</head>
<body>
  <div class="toast" id="toast">

    <div class="header">
      <div class="icon-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="10.5" y="0" width="3" height="3.5" rx="1.5" fill="#00B894"/>
          <path d="M12 3.5 C16.5 3.5,21 7.5,21 13 L21 17 L3 17 L3 13 C3 7.5,7.5 3.5,12 3.5 Z" fill="#00B894"/>
          <rect x="2" y="16.5" width="20" height="2.5" rx="1.25" fill="#00B894"/>
          <circle cx="12" cy="21.5" r="1.5" fill="#00B894"/>
        </svg>
      </div>
      <div>
        <div class="label-title">스트레칭 할 시간이에요! <span class="dev-badge" id="devBadge" style="display:none">DEV</span></div>
        <div class="label-sub" id="guideSub">잠깐의 휴식이 건강을 지켜줍니다</div>
      </div>
    </div>

    <!-- Guide zone: animation + instruction -->
    <div class="guide-zone">
      <div class="anim-area" id="animArea"></div>
      <div class="guide-text-wrap" id="guideTextWrap">
        <div class="guide-type" id="guideType"></div>
        <div class="guide-inst-title" id="guideInstTitle"></div>
        <div class="guide-inst-desc" id="guideInstDesc"></div>
      </div>
    </div>

    <!-- Daily gauge -->
    <div class="gauge">
      <div class="gauge-header">
        <span class="gauge-label">오늘 스트레칭</span>
        <span class="gauge-count" id="gaugeCount"></span>
      </div>
      <div class="gauge-dots" id="gaugeDots"></div>
    </div>

    <div class="actions">
      <button class="btn btn-primary"   id="btnDone">스트레칭 완료</button>
      <button class="btn btn-secondary" id="btnSnooze">5분 뒤 다시 알리기</button>
      <button class="btn btn-ghost"     id="btnDnd">
        방해 금지 모드 <span class="caret" id="caret">▾</span>
      </button>
      <div class="dnd-panel" id="dndPanel">
        <div class="dnd-grid">
          <button class="dnd-opt" data-m="60">1시간 동안</button>
          <button class="dnd-opt" data-m="120">2시간 동안</button>
          <button class="dnd-opt" data-m="180">3시간 동안</button>
          <button class="dnd-opt" data-m="240">4시간 동안</button>
          <button class="dnd-opt full" data-m="-1">오늘은 끄기</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    const api = window.electronAPI;

    // Auto-resize window to fit content whenever toast height changes
    new ResizeObserver(entries => {
      const h = Math.ceil(entries[0].borderBoxSize[0].blockSize) + 8; // +8 = top margin
      api.send('alarm:resize', h);
    }).observe(document.getElementById('toast'));

    // Parse URL params injected by main.js
    const params   = new URLSearchParams(location.search);
    if (params.get('dev') === '1') document.getElementById('devBadge').style.display = 'inline-block';
    const guideIdx = parseInt(params.get('guide') ?? '0');
    const count    = parseInt(params.get('count') ?? '0');
    const goal     = parseInt(params.get('goal')  ?? '8');

    // ── Guide definitions ──────────────────────────────────────────
    // paired: true → 간단한 스트레칭 두 가지를 함께 제안
    const GUIDES = [
      // ── 간단한 스트레칭 (paired) ───────────────────────────────
      {
        type: '손목 / 손가락',
        paired: true,
        items: [
          { title: '손목 돌리기',    desc: '시계·반시계 방향 각 10회' },
          { title: '손가락 쫙 펴기', desc: '5초 유지 후 주먹 쥐기, 5회' },
        ],
        anim: 'wrist',
      },
      {
        type: '눈 스트레칭',
        paired: true,
        items: [
          { title: '20-20-20 법칙',    desc: '6m 거리 사물을 20초간 바라보기' },
          { title: '눈동자 천천히 굴리기', desc: '눈 감고 좌→우→위→아래, 3회' },
        ],
        anim: 'eye',
      },
      {
        type: '목 스트레칭',
        paired: true,
        items: [
          { title: '목 좌우로 돌리기', desc: '각 방향 5초 유지, 3회 반복' },
          { title: '턱 당기기',       desc: '턱을 목 쪽으로 당겨 5초 유지, 5회' },
        ],
        anim: 'neck',
      },
      {
        type: '어깨 스트레칭',
        paired: true,
        items: [
          { title: '어깨 으쓱이기',    desc: '귀까지 올렸다가 한번에 탁 내리기, 5회' },
          { title: '어깨 크게 돌리기', desc: '앞→위→뒤 방향으로 천천히 5회씩' },
        ],
        anim: 'breathe',
      },
      // ── 본격 스트레칭 (single) ─────────────────────────────────
      {
        type: '가슴 / 등',
        instTitle: '손 깍지 끼고 등을 둥글게 말아요',
        instDesc:  '양손을 앞으로 뻗고 등을 늘려 15초 유지, 2회',
        anim: 'back',
      },
      {
        type: '허리 / 골반',
        instTitle: '허리를 좌우로 기지개 켜요',
        instDesc:  '한 손을 위로 올려 옆으로 15초, 양쪽 각 2회',
        anim: 'back',
      },
      {
        type: '스쿼트',
        instTitle: '자리에서 스쿼트 10회',
        instDesc:  '무릎이 발끝을 넘지 않게 천천히 내려갔다 올라오기',
        anim: 'squat',
      },
      {
        type: '가벼운 걷기',
        instTitle: '잠깐 일어나서 걸어봐요',
        instDesc:  '2~3분만 걸어도 혈액순환에 좋아요',
        anim: 'walk',
      },
      {
        type: '종아리 / 발목',
        instTitle: '앉은 채로 뒤꿈치 들었다 놓기',
        instDesc:  '양 뒤꿈치를 들어 3초 유지, 15회 반복',
        anim: 'calf',
      },
      {
        type: '심호흡',
        instTitle: '깊이 호흡하며 팔을 올려요',
        instDesc:  '4초 들이쉬며 팔 위로 → 6초 내쉬며 천천히 내리기, 5회',
        anim: 'breathe',
      },
      {
        type: '고관절 / 허벅지',
        instTitle: '앉아서 다리를 교차해 늘려요',
        instDesc:  '발목을 반대쪽 무릎 위에 올려 15초 유지, 양쪽',
        anim: 'squat',
      },
    ];

    const g = GUIDES[guideIdx % GUIDES.length];

    // ── Populate guide text ────────────────────────────────────────
    if (g.paired) {
      document.getElementById('guideTextWrap').innerHTML = `
        <div class="guide-type">${g.type}</div>
        <div class="guide-pair-item">
          <span class="guide-pair-num">①</span>
          <div class="guide-pair-body">
            <div class="guide-pair-title">${g.items[0].title}</div>
            <div class="guide-pair-desc">${g.items[0].desc}</div>
          </div>
        </div>
        <div class="guide-pair-divider"></div>
        <div class="guide-pair-item">
          <span class="guide-pair-num">②</span>
          <div class="guide-pair-body">
            <div class="guide-pair-title">${g.items[1].title}</div>
            <div class="guide-pair-desc">${g.items[1].desc}</div>
          </div>
        </div>
      `;
    } else {
      document.getElementById('guideType').textContent      = g.type;
      document.getElementById('guideInstTitle').textContent = g.instTitle;
      document.getElementById('guideInstDesc').textContent  = g.instDesc;
    }

    // ── Build animation element ────────────────────────────────────
    const animArea = document.getElementById('animArea');
    switch (g.anim) {
      case 'breathe':
        animArea.innerHTML =
          '<div class="breathe-outer"><div class="breathe-inner"></div></div>';
        break;
      case 'wrist':
        animArea.innerHTML = `
          <svg class="wrist-svg" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="19" stroke="rgba(0,184,148,0.22)" stroke-width="2.5"/>
            <path d="M24 5 A19 19 0 1 1 7 35" stroke="#00B894" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M20 5 L24 5 L24 10" stroke="#00B894" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>`;
        break;
      case 'back':
        animArea.innerHTML = `
          <div class="back-bars">
            <div class="back-bar"></div><div class="back-bar"></div>
            <div class="back-bar"></div><div class="back-bar"></div>
            <div class="back-bar"></div>
          </div>`;
        break;
      case 'squat':
        animArea.innerHTML = `
          <div class="squat-wrap">
            <div class="squat-head"></div>
            <div class="squat-body"></div>
            <div class="squat-legs">
              <div class="squat-leg"></div><div class="squat-leg"></div>
            </div>
          </div>`;
        break;
      case 'walk':
        animArea.innerHTML = `
          <div class="walk-wrap">
            <div class="walk-body"></div>
            <div class="walk-feet">
              <div class="walk-foot"></div><div class="walk-foot"></div>
            </div>
          </div>`;
        break;
      case 'eye':
        animArea.innerHTML =
          '<div class="eye-socket"><div class="eye-pupil"></div></div>';
        break;
      case 'neck':
        animArea.innerHTML = `
          <div class="neck-wrap">
            <div class="neck-head"></div>
            <div class="neck-stub"></div>
          </div>`;
        break;
      case 'calf':
        animArea.innerHTML = `
          <div class="calf-figure">
            <div class="calf-body"></div>
            <div class="calf-heels">
              <div class="calf-heel"></div><div class="calf-heel"></div>
            </div>
          </div>`;
        break;
    }

    // ── Build gauge dots ───────────────────────────────────────────
    const dotsEl = document.getElementById('gaugeDots');
    const total  = Math.max(goal, count);
    for (let i = 0; i < total; i++) {
      const dot = document.createElement('div');
      dot.className = 'gauge-dot' + (i < count ? (i < goal ? ' filled' : ' extra') : '');
      dotsEl.appendChild(dot);
    }
    document.getElementById('gaugeCount').textContent = `${count} / ${goal}`;

    let dndOpen = false;

    // ── Button actions ─────────────────────────────────────────────
    document.getElementById('btnDone').addEventListener('click', () => {
      api.send('alarm:action', { action: 'complete' });
    });
    document.getElementById('btnSnooze').addEventListener('click', () => {
      api.send('alarm:action', { action: 'snooze' });
    });
    document.getElementById('btnDnd').addEventListener('click', () => {
      dndOpen = !dndOpen;
      document.getElementById('dndPanel').classList.toggle('open', dndOpen);
      document.getElementById('caret').classList.toggle('open', dndOpen);
    });
    document.querySelectorAll('.dnd-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        api.send('alarm:action', { action: 'dnd', value: parseInt(btn.dataset.m) });
      });
    });

    // ── Keyboard shortcuts ─────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        api.send('alarm:action', { action: 'complete' });
      } else if (e.key === 'Escape') {
        api.send('alarm:action', { action: 'snooze' });
      }
    });
  </script>
</body>
</html>
